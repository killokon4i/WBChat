# В Railway Dashboard → Volumes: mount path /data/media (иначе аватары пропадут после рестарта)
[build]
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
# Миграции перед стартом (иначе API чата падает без колонки attachment.variant)
releaseCommand = "python manage.py migrate --noinput"
# ASGI обязателен для WebSocket (чаты, уведомления)
startCommand = "python manage.py migrate --noinput && daphne -b 0.0.0.0 -p ${PORT:-8000} WBChat.asgi:application"

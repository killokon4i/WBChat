{% load user_extras %}
{% if user.avatar %}
<img src="{{ user.avatar.url }}" alt="{{ alt|default:user.get_full_name }}" class="{{ img_class }}">
{% else %}
<span class="avatar-initials{% if initials_class %} {{ initials_class }}{% endif %}" aria-hidden="true">{{ user|user_initials }}</span>
{% endif %}

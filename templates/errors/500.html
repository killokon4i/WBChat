<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Ошибка сервера</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #050505; color: #f2f2ef; }
        .wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 40px 20px; }
        .code { font-size: 120px; line-height: 1; font-weight: 800; background: linear-gradient(135deg, #ff2fb3, #ca1d91); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
        h1 { font-size: 24px; margin-bottom: 12px; }
        p { color: #8f8f89; font-size: 15px; max-width: 440px; margin-bottom: 32px; }
        .btns { display: flex; gap: 12px; }
        .btns a { padding: 12px 28px; border-radius: 10px; font-weight: 500; font-size: 15px; text-decoration: none; }
        .btn-main { background: #ff2fb3; color: #f2f2ef; }
        .btn-back { background: #1d1d1d; color: #f2f2ef; border: 1px solid #2e2e2b; }

        @media (max-width: 480px) {
            .wrap {
                min-height: 60vh;
                padding: 20px 12px;
            }

            .code {
                font-size: 84px;
                margin-bottom: 10px;
            }

            h1 {
                font-size: 20px;
            }

            p {
                margin-bottom: 16px;
            }

            .btns {
                width: 100%;
                flex-wrap: wrap;
            }

            .btns a {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="code">500</div>
        <h1>Ошибка сервера</h1>
        <p>Что-то пошло не так. Мы уже разбираемся. Попробуйте обновить страницу или вернуться позже.</p>
        <div class="btns">
            <a href="/" class="btn-main">На главную</a>
            <a href="javascript:history.back()" class="btn-back">Назад</a>
        </div>
    </div>
</body>
</html>

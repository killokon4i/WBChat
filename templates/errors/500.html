<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Ошибка сервера</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a1a; color: #fff; }
        .wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 40px 20px; }
        .code { font-size: 120px; line-height: 1; font-weight: 800; background: linear-gradient(135deg, #CB11AB, #8B0077); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
        h1 { font-size: 24px; margin-bottom: 12px; }
        p { color: #888; font-size: 15px; max-width: 440px; margin-bottom: 32px; }
        .btns { display: flex; gap: 12px; }
        .btns a { padding: 12px 28px; border-radius: 10px; font-weight: 500; font-size: 15px; text-decoration: none; }
        .btn-main { background: #CB11AB; color: white; }
        .btn-back { background: #252525; color: #fff; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="code">500</div>
        <h1>Ошибка сервера</h1>
        <p>Что-то пошло не так. Мы уже разбираемся. Попробуйте обновить страницу или вернуться позже.</p>
        <div class="btns">
            <a href="/" class="btn-main">На главную</a>
            <a href="javascript:history.back()" class="btn-back">Назад</a>
        </div>
    </div>
</body>
</html>

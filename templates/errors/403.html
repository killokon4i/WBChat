{% extends 'base.html' %}

{% block title %}403 — Доступ запрещён{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px 20px;">
    <div style="font-size:120px;line-height:1;font-weight:800;background:linear-gradient(135deg,var(--magenta),var(--purplish));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;">403</div>
    <h1 style="font-size:24px;color:var(--text-primary);margin-bottom:12px;">Доступ запрещён</h1>
    <p style="color:var(--text-muted);font-size:15px;max-width:440px;margin-bottom:32px;">
        У вас нет прав для просмотра этой страницы.
    </p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
        <a href="/" style="padding:12px 28px;background:var(--magenta);color:white;border-radius:10px;font-weight:500;font-size:15px;">На главную</a>
        <a href="javascript:history.back()" style="padding:12px 28px;background:var(--bg-hover);color:var(--text-primary);border:1px solid var(--border-color);border-radius:10px;font-weight:500;font-size:15px;">Назад</a>
    </div>
</div>
{% endblock %}

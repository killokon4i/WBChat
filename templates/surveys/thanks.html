{% extends 'base.html' %}
{% block title %}Опрос завершён — WBChat{% endblock %}

{% block content %}
<div class="container state-page">
    <div class="card state-card text-center">
        <div class="state-icon state-icon--success">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1 class="page-title" style="margin-bottom:8px;">Спасибо за участие!</h1>
        <p class="text-secondary">
            Ответы по опросу «{{ survey.title }}» успешно сохранены.
        </p>
        <div class="state-actions">
            <a href="{% url 'surveys_list' %}" class="btn btn-primary">К списку опросов</a>
        </div>
    </div>
</div>

<style>
.state-page { max-width: 760px; }
.state-card { padding: 40px 24px; }
.state-icon { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 14px; display:flex; align-items:center; justify-content:center; }
.state-icon--success { color: #16a34a; background: rgba(34,197,94,.14); border: 1px solid rgba(34,197,94,.3); }
.state-actions { margin-top: 16px; display:flex; justify-content:center; }
</style>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Опрос уже пройден — WB Bank{% endblock %}

{% block content %}
<div class="container state-page wb-portal-marketing">
    <div class="card state-card text-center">
        <div class="state-icon state-icon--warn">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 8v4"/><path d="M12 16h.01"/><circle cx="12" cy="12" r="9"/></svg>
        </div>
        <h1 class="page-title" style="margin-bottom:8px;">Опрос уже пройден</h1>
        <p class="text-secondary">
            Вы уже прошли опрос «{{ survey.title }}». Повторное прохождение отключено для этого опроса.
        </p>
        <div class="state-actions">
            <a href="{% url 'surveys_list' %}" class="btn btn-primary">К списку опросов</a>
        </div>
    </div>
</div>

<style>
.state-page { max-width: 760px; }
.state-card { padding: 40px 24px; }
.state-icon { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 14px; display:flex; align-items:center; justify-content:center; }
.state-icon--warn { color: #ff73cb; background: rgba(255,47,179,.14); border: 1px solid rgba(255,47,179,.32); }
.state-actions { margin-top: 16px; display:flex; justify-content:center; }
</style>
{% endblock %}

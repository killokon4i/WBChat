<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    {% load static %}
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#e400af">
    {% include 'partials/favicon.html' %}
    <base target="_top">
    <title>{% block title %}Чат — WB Хаб{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/wb-bank-portal.css' %}">
    <link rel="stylesheet" href="{% static 'css/wb-portal-skin.css' %}?v=authflow1">
    {% block extra_styles %}{% endblock %}
</head>
<body class="portal-body chat-embed-body">
{% block content %}{% endblock %}
{% block extra_scripts %}{% endblock %}
<script>
(function () {
    var html = document.documentElement;

    function applyTheme(theme) {
        if (!theme) return;
        html.setAttribute('data-theme', theme);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) {
            meta.setAttribute('content', theme === 'dark' ? '#1a1a1e' : '#e400af');
        }
    }

    function readParentTheme() {
        try {
            if (window.parent && window.parent.document) {
                return window.parent.document.documentElement.getAttribute('data-theme');
            }
        } catch (e) { /* cross-origin */ }
        try {
            return localStorage.getItem('wb-theme');
        } catch (e2) { /* private mode */ }
        return null;
    }

    applyTheme(readParentTheme() || 'light');

    try {
        if (window.parent && window.parent.document) {
            var observer = new MutationObserver(function () {
                applyTheme(readParentTheme());
            });
            observer.observe(window.parent.document.documentElement, {
                attributes: true,
                attributeFilter: ['data-theme']
            });
        }
    } catch (e) { /* cross-origin */ }

    window.addEventListener('storage', function (ev) {
        if (ev.key === 'wb-theme' && ev.newValue) {
            applyTheme(ev.newValue);
        }
    });
})();
</script>
</body>
</html>

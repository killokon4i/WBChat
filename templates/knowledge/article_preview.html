{% extends 'base.html' %}
{% block title %}Предпросмотр — WBChat{% endblock %}
{% block extra_styles %}
<style>
    .preview-wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
    }

    .preview-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
    }

    .preview-header h1 {
        color: var(--text-primary);
        font-size: 24px;
    }

    .preview-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 32px;
    }

    .preview-title {
        color: var(--text-primary);
        font-size: 28px;
        margin-bottom: 20px;
    }

    .preview-content {
        color: var(--text-secondary);
        line-height: 1.7;
    }

    @media (max-width: 480px) {
        .preview-wrap {
            padding: 0;
        }

        .preview-header {
            flex-direction: column;
            align-items: stretch;
            margin-bottom: 12px;
        }

        .preview-header h1 {
            font-size: 20px;
        }

        .preview-header .btn {
            width: 100%;
            justify-content: center;
        }

        .preview-card {
            padding: 14px;
            border-radius: 12px;
        }

        .preview-title {
            font-size: 22px;
            margin-bottom: 12px;
        }
    }
</style>
{% endblock %}
{% block content %}
<div class="preview-wrap">
    <div class="preview-header">
        <h1>Предпросмотр</h1>
        <button onclick="window.close()" class="btn btn-secondary">Закрыть</button>
    </div>
    <div class="preview-card">
        <h1 class="preview-title">{{ title }}</h1>
        <div class="article-content preview-content">{{ content|safe }}</div>
    </div>
</div>
{% endblock %}
